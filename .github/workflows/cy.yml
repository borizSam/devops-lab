name: CI Pipeline
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Clone repository
        uses: actions/checkout@v2
      - name: Build Docker Imagene
        run: |
          docker build -t myapp:latest ./app
      - name: test basico
        run: |
          docker run --rm myapp:latest  